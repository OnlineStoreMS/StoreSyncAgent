name: Build and Push Docker Image

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      image_tag:
        description: '镜像标签（留空则用 sha-xxx）'
        required: false
        default: ''

concurrency:
  group: docker-ghcr-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/onlinestorems/storesyncagent

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image tag
        id: meta
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            TAG="${{ inputs.image_tag }}"
          else
            TAG="sha-${GITHUB_SHA::7}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha,scope=storesyncagent
          cache-to: type=gha,mode=max,scope=storesyncagent

      - name: Summary
        run: |
          {
            echo "## StoreSyncAgent 镜像已推送"
            echo ""
            echo "- \`${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}\`"
            echo "- \`${{ env.IMAGE_NAME }}:latest\`"
          } >> "$GITHUB_STEP_SUMMARY"
