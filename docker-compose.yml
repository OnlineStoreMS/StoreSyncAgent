# 本地构建：make up
# ACR 拉取：make up-images

name: storesyncagent

services:
  storesyncagent-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    image: asialeaf/storesyncagent-api:local
    container_name: storesyncagent-api
    restart: unless-stopped
    volumes:
      - ./configs/config.yaml:/config/config.yaml:ro
      - ./data:/app/data
    environment:
      KDZS_PASSWORD: ${KDZS_PASSWORD:-}
      KDZS_ACCOUNT_ACCOUNT_1_PASSWORD: ${KDZS_ACCOUNT_ACCOUNT_1_PASSWORD:-}
      KDZS_ACCOUNT_ACCOUNT_2_PASSWORD: ${KDZS_ACCOUNT_ACCOUNT_2_PASSWORD:-}
    ports:
      - "${API_PORT:-8097}:8097"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8097/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  storesyncagent-web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    image: asialeaf/storesyncagent-web:local
    container_name: storesyncagent-web
    restart: unless-stopped
    depends_on:
      storesyncagent-api:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-5178}:80"
