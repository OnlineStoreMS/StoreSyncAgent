# 与 docker-compose.yml 叠加，从 ACR 拉取镜像（不本地 build）
# 需配置 .env 中 ACR_IMAGE_PREFIX、IMAGE_TAG

services:
  storesyncagent-api:
    image: ${ACR_IMAGE_PREFIX}/storesyncagent-api:${IMAGE_TAG:-latest}
    pull_policy: always

  storesyncagent-web:
    image: ${ACR_IMAGE_PREFIX}/storesyncagent-web:${IMAGE_TAG:-latest}
    pull_policy: always
