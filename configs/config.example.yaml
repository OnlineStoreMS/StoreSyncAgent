server:
  port: 8097
  mode: release

database:
  driver: postgres
  postgres_dsn: "host=POSTGRES_HOST user=storesyncagent password=CHANGE_ME dbname=storesyncagent port=5432 sslmode=disable TimeZone=Asia/Shanghai"

auth:
  enabled: true
  jwt_secret: "change-me-use-long-random-jwt-secret-in-production"

cors:
  allow_origins:
    - "http://localhost:5178"
    - "http://127.0.0.1:5178"
    - "http://localhost:5174"
    - "http://127.0.0.1:5174"

# 全局快递助手 API 地址；各租户账号在「账号管理」维护（kdzs_accounts 表）
kdzs:
  base_url: https://df.kdzs.com
